version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: omnichannel
      POSTGRES_PASSWORD: omnichannel
      POSTGRES_DB: omnichannel
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnichannel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production-min-16-chars
      JWT_REFRESH_SECRET: change-me-refresh-in-production-16
      CREDENTIALS_ENCRYPTION_KEY: change-me-encryption-key-32chars!
      APP_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: postgresql://omnichannel:omnichannel@postgres:5432/omnichannel
      REDIS_URL: redis://redis:6379
      CREDENTIALS_ENCRYPTION_KEY: change-me-encryption-key-32chars!
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api

volumes:
  pgdata:
